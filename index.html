
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Campaign Form</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 40px auto;
}

.hidden {
  display: none;
}

button {
  margin-top: 20px;
  padding: 10px 16px;
  font-size: 16px;
}
</style>

<script>
function toggleSocietyInput() {

  const yes = document.getElementById("society_yes");
  const box = document.getElementById("society_box");

  if (yes.checked) {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }

}
</script>

</head>

<body>

<h2>Email Campaign Form</h2>

<form>

<label for="name">Your name:</label><br>
<input type="text" id="name" name="name"><br><br>


<p>Are you writing on behalf of a society?</p>

<label>
<input type="radio" name="society" id="society_yes" onclick="toggleSocietyInput()">
Yes
</label>

<label>
<input type="radio" name="society" id="society_no" onclick="toggleSocietyInput()">
No
</label>


<div id="society_box" class="hidden">
<br>
<label for="society_name">Which society?</label><br>
<input type="text" id="society_name" name="society_name">
</div>


<br>

<a href="mailto:will.fearn@icloud.com?subject=Divestment&body=Dear%20Peter%20Mathieson%2C%0A%0AMy%20name%20is%20%7B{name}%7D%20and%20I%20am%20writing%20on%20behalf%20of%20%7B{society_name}%7D.%0A%0AI%20want%20divestment%20please%20%3A)%0A%0AThank%20you%2C%0A%7B{Name}%7D">
<button type="button">Continue</button>
</a>

</form>

</body>
</html>
