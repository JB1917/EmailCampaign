<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Campaign Form</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 40px auto;
}

.hidden {
  display: none;
}

button {
  margin-top: 20px;
  padding: 10px 16px;
  font-size: 16px;
}
</style>

<script>
function toggleSocietyInput() {
  const yes = document.getElementById("society_yes");
  const box = document.getElementById("society_box");

  if (yes.checked) {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

function sendEmail() {
  const name = document.getElementById("name").value;
  const society = document.getElementById("society_name").value;

  const subject = "Divestment";

  // Build the body
  let body = "Dear Peter Mathieson,\n\nMy name is " + name;
  if (society) {
    body += " and I am writing on behalf of " + society;
  }
  body += ".\n\nI want divestment please :)\n\nThank you,\n" + name;

  // Encode and open mail client
  const mailto = "mailto:will.fearn@icloud.com" +
                 "?subject=" + encodeURIComponent(subject) +
                 "&body=" + encodeURIComponent(body);

  window.location.href = mailto;
}
</script>

</head>

<body>

<h2>Email Campaign Form</h2>

<form>

<label for="name">Your name:</label><br>
<input type="text" id="name" name="name"><br><br>

<p>Are you writing on behalf of a society?</p>

<label>
  <input type="radio" name="society" id="society_yes" onclick="toggleSocietyInput()">
  Yes
</label>

<label>
  <input type="radio" name="society" id="society_no" onclick="toggleSocietyInput()">
  No
</label>

<div id="society_box" class="hidden">
  <br>
  <label for="society_name">Which society?</label><br>
  <input type="text" id="society_name" name="society_name">
</div>

<br>

<button type="button" onclick="sendEmail()">Continue</button>

</form>

</body>
</html>
